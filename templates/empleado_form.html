{% extends "base.html" %}
{% block title %}{{ 'Editar' if empleado else 'Nuevo' }} Empleado{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-user-{{ 'edit' if empleado else 'plus' }} me-2"></i>
                    {{ 'Editar' if empleado else 'Nuevo' }} Empleado
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre completo *</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" 
                               value="{{ empleado.nombre if empleado else '' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               value="{{ empleado.email if empleado else '' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            {{ 'Nueva contraseña (dejar en blanco para no cambiar)' if empleado else 'Contraseña *' }}
                        </label>
                        <input type="password" class="form-control" id="password" name="password" 
                               {{ 'required' if not empleado else '' }}>
                        {% if empleado %}
                        <small class="text-muted">Deja en blanco para mantener la contraseña actual</small>
                        {% endif %}
                    </div>
                    
                    <div class="mb-3">
                        <label for="rol" class="form-label">Rol *</label>
                        <select class="form-select" id="rol" name="rol" required>
                            <option value="consultor" {% if empleado and empleado.rol == 'consultor' %}selected{% endif %}>
                                Consultor
                            </option>
                            <option value="admin" {% if empleado and empleado.rol == 'admin' %}selected{% endif %}>
                                Administrador
                            </option>
                        </select>
                    </div>
                    
                    <div class="text-end">
                        <a href="{{ url_for('listar_empleados') }}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
